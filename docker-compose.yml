services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: author
      POSTGRES_PASSWORD: author
      POSTGRES_DB: author_js
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U author -d author_js"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:7
    ports:
      - "27029:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "63799:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
